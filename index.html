<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 나랑 닮은 동물은?</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>동물상 테스트</h1>
            <p class="subtitle">인공지능이 분석하는 나의 동물상</p>
        </header>

        <main>
            <div class="upload-section">
                <div id="image-upload-area" class="image-box">
                    <img id="face-image" src="" alt="Face Image" class="hidden">
                    <div id="upload-label" class="upload-text">
                        <span class="icon">📷</span>
                        <p>얼굴 사진을 올리거나 끌어다 놓으세요!</p>
                    </div>
                </div>
                <input type="file" id="image-input" accept="image/*" class="hidden">
                <div class="button-group">
                    <button id="upload-btn" class="btn primary-btn">사진 선택하기</button>
                </div>
            </div>

            <div id="loading-container" class="hidden">
                <div class="spinner"></div>
                <p>AI가 당신의 얼굴을 분석 중입니다...</p>
            </div>

            <div id="result-container" class="hidden">
                <div class="result-box">
                    <h2 id="result-message">분석 완료!</h2>
                    <h3 id="result-title">당신은 '강아지'상 입니다!</h3>
                    <div id="label-container">
                        <!-- Results will be injected here -->
                    </div>
                    <button id="retry-btn" class="btn secondary-btn">다시 시도하기</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Animal Face Test. All rights reserved.</p>
            <p class="model-info">Powered by Google Teachable Machine</p>
        </footer>
    </div>

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
