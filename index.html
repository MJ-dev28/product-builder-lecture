<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Face Test</title>
    <meta name="google-adsense-account" content="ca-pub-5099077575281739">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5099077575281739"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        /* 1. 상단 네비게이션 스타일 */
        .nav-bar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 15px;
            z-index: 1000;
        }
        .nav-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .nav-btn:hover { background-color: #e84118; transform: scale(1.05); }

        /* 2. 동물상 테스트 모달(팝업) 스타일 */
        #animal-modal {
            display: none; /* 초기에는 숨김 */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        /* 이미지 관련 스타일 */
        #image-preview {
            max-width: 100%;
            max-height: 250px;
            margin: 15px auto;
            display: none;
            border-radius: 10px;
        }
        .upload-box {
            border: 2px dashed #ccc;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            background: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn" onclick="openModal()">🐾 동물상 테스트 시작</button>
    </div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle" class="theme-toggle">Toggle Theme</button>
        <div class="lotto-numbers">
            <span class="number"></span><span class="number"></span><span class="number"></span>
            <span class="number"></span><span class="number"></span><span class="number"></span>
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div id="animal-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>AI 동물상 테스트</h2>
            <p>사진을 업로드하여 결과를 확인하세요!</p>
            
            <div class="upload-box" onclick="document.getElementById('file-input').click();">
                <span>클릭하여 사진 선택</span>
                <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)" style="display: none;">
            </div>

            <img id="image-preview" src="#" alt="미리보기">
            <div id="label-container" style="margin-top: 15px; font-weight: bold; font-size: 1.2rem;"></div>
        </div>
    </div>

    <div class="form-container container">
        <h2>제휴문의</h2>
        <form action="https://formspree.io/f/xykdzkdb" method="POST">
            <label for="name">이름:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">문의하기</button>
        </form>
    </div>

    <div id="disqus_thread" style="max-width: 800px; margin: 20px auto; padding: 0 20px;"></div>

    <script src="main.js"></script> 
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/6Paj83fh1/";
        let model, labelContainer, maxPredictions;

        // 모달 제어 함수
        function openModal() {
            document.getElementById('animal-modal').style.display = 'flex';
            if (!model) loadModel(); // 열 때 모델 로드
        }
        function closeModal() {
            document.getElementById('animal-modal').style.display = 'none';
        }

        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            labelContainer = document.getElementById("label-container");
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('image-preview');
                img.src = e.target.result;
                img.style.display = 'block';
                img.onload = () => predict(img);
            };
            reader.readAsDataURL(file);
        }

        async function predict(imgElement) {
            const prediction = await model.predict(imgElement);
            labelContainer.innerHTML = "";
            prediction.sort((a, b) => b.probability - a.probability);

            for (let i = 0; i < maxPredictions; i++) {
                const percentage = (prediction[i].probability * 100).toFixed(0);
                const div = document.createElement("div");
                if (i === 0) div.style.color = "#ff4757";
                div.innerHTML = `${prediction[i].className}: ${percentage}%`;
                labelContainer.appendChild(div);
            }
        }
    </script>

    <script>
        var disqus_config = function () {
            this.page.url = 'https://product-builder-lecture-bzw.pages.dev/';
            this.page.identifier = 'lotto-main';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-jm6fhdqsrh.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
